name: Daily Agent Papers

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock
      - run: npm run papers:daily
      - run: npm run build
      - name: Commit daily paper data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/assets/content/data/daily-papers.json dist/assets/content/data/daily-papers.json dist/index.html dist/css/style.css dist/js/main.js
          if git diff --cached --quiet; then
            echo "No daily paper changes."
          else
            git commit -m "chore: update daily agent papers"
            git push
          fi
